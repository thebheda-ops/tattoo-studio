<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      gap: 20px; 
      padding: 20px; 
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    /* Cover Image - 1280x720 */
    .cover {
      width: 1280px;
      height: 720px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
    }
    
    .cover::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 70%, rgba(255,51,51,0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 30%, rgba(255,51,51,0.1) 0%, transparent 40%);
    }
    
    .cover-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }
    
    .cover-badge {
      display: inline-block;
      background: #ff3333;
      color: white;
      padding: 8px 24px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    
    .cover h1 {
      font-size: 72px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 8px;
      margin-bottom: 10px;
      line-height: 1;
    }
    
    .cover h1 span {
      color: #ff3333;
    }
    
    .cover-subtitle {
      font-size: 24px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 40px;
    }
    
    .cover-features {
      display: flex;
      gap: 40px;
      justify-content: center;
    }
    
    .cover-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .cover-feature svg {
      width: 24px;
      height: 24px;
      color: #ff3333;
    }
    
    .cover-tech {
      position: absolute;
      bottom: 40px;
      display: flex;
      gap: 30px;
    }
    
    .cover-tech span {
      background: rgba(255,255,255,0.1);
      padding: 8px 20px;
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    /* Thumbnail - 600x400 */
    .thumbnail {
      width: 600px;
      height: 400px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px solid #ff3333;
    }
    
    .thumbnail::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,51,51,0.2) 0%, transparent 70%);
    }
    
    .thumbnail-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }
    
    .thumbnail-badge {
      display: inline-block;
      background: #ff3333;
      color: white;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    
    .thumbnail h1 {
      font-size: 42px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 8px;
      line-height: 1;
    }
    
    .thumbnail h1 span {
      color: #ff3333;
    }
    
    .thumbnail-subtitle {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    
    .thumbnail-price {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #ff3333;
      color: white;
      padding: 10px 20px;
      font-size: 20px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <!-- Cover Image -->
  <div class="cover">
    <div class="cover-content">
      <div class="cover-badge">Complete Website Template</div>
      <h1>TATTOO<br><span>STUDIO</span></h1>
      <div class="cover-subtitle">Next.js + WhatsApp Booking System</div>
      <div class="cover-features">
        <div class="cover-feature">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Mobile Responsive
        </div>
        <div class="cover-feature">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          WhatsApp Booking
        </div>
        <div class="cover-feature">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Dark Modern Design
        </div>
      </div>
    </div>
    <div class="cover-tech">
      <span>Next.js 16</span>
      <span>JavaScript</span>
      <span>Tailwind CSS</span>
      <span>Static Export</span>
    </div>
  </div>

  <!-- Thumbnail -->
  <div class="thumbnail">
    <div class="thumbnail-price">$39</div>
    <div class="thumbnail-content">
      <div class="thumbnail-badge">Website Template</div>
      <h1>TATTOO<br><span>STUDIO</span></h1>
      <div class="thumbnail-subtitle">WhatsApp Booking Included</div>
    </div>
  </div>
</body>
</html>
